<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>온점 을지로점 근태 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.header{background:#1F4E79;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.header h1{color:#fff;font-size:15px;font-weight:600}
.month-nav{display:flex;align-items:center;gap:10px}
.month-nav button{background:rgba(255,255,255,0.15);border:none;border-radius:6px;width:28px;height:28px;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:rgba(255,255,255,0.3)}
.month-nav span{color:#fff;font-size:14px;font-weight:600;min-width:70px;text-align:center}
.main-tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5e7;position:sticky;top:47px;z-index:19}
.mtab{flex:1;padding:11px 8px;text-align:center;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;-webkit-appearance:none}
.mtab.on{color:#1F4E79;border-bottom:2px solid #1F4E79;font-weight:600}
.content{padding:12px 16px;padding-bottom:80px}
.week-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:9px 12px;margin-bottom:10px;border:1px solid #e5e5e7}
.week-nav button{background:#f5f5f7;border:none;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;color:#1d1d1f;font-weight:500}
.week-nav button:active{background:#e5e5e7}
.week-nav button:disabled{color:#ccc;background:#f5f5f7}
.week-center{text-align:center}
.week-label{font-size:13px;font-weight:600;color:#1d1d1f}
.week-badge{display:inline-block;margin-top:3px;font-size:10px;background:#E6F1FB;color:#0C447C;border-radius:4px;padding:2px 7px;font-weight:600}
.hint{font-size:11px;color:#aaa;text-align:center;margin-bottom:8px}
.emp-card{background:#fff;border-radius:12px;border:1px solid #e5e5e7;margin-bottom:8px;overflow:hidden}
.emp-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f9f9fb;border-bottom:1px solid #e5e5e7}
.emp-nm{font-size:13px;font-weight:600;color:#1d1d1f}
.badge-b{font-size:10px;background:#E6F1FB;color:#0C447C;border-radius:4px;padding:2px 6px;font-weight:600}
.badge-n{font-size:10px;color:#aaa}
.days-wrap{padding:8px 10px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.days-wrap::-webkit-scrollbar{display:none}
.dcell{flex:0 0 42px;height:50px;border:1px solid #e5e5e7;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#f9f9fb;user-select:none}
.dcell:active{opacity:0.6;transform:scale(0.95)}
.dcell.sun{background:#FFF0F0;border-color:#FFD7D7;cursor:default}
.dcell.sat{background:#EEF5FF;border-color:#C8DFF8}
.dcell .dd{font-size:11px;font-weight:600;color:#1d1d1f;line-height:1.3}
.dcell.sun .dd{color:#D85A30}
.dcell.sat .dd{color:#185FA5}
.dcell .dn{font-size:9px;color:#aaa;line-height:1.3}
.dcell.sun .dn{color:#D85A30}
.dcell.sat .dn{color:#185FA5}
.dcell .dc{font-size:9px;font-weight:700;margin-top:1px;min-height:11px;line-height:1}
.dcell[data-v="연차"]{background:#D6EFCA;border-color:#7BBF40} .dcell[data-v="연차"] .dc{color:#2E5C0E}
.dcell[data-v="반차"]{background:#EDF7E3;border-color:#A8D87A} .dcell[data-v="반차"] .dc{color:#3B6D11}
.dcell[data-v="휴무"]{background:#FAECE7;border-color:#F0997B} .dcell[data-v="휴무"] .dc{color:#993C1D}
.dcell[data-v="유후"]{background:#C8EDE7;border-color:#3DAAA0} .dcell[data-v="유후"] .dc{color:#14635B}
.dcell[data-v="반유"]{background:#E4F6F4;border-color:#7ECEC9} .dcell[data-v="반유"] .dc{color:#1A7A71}
.dcell[data-v="종추"]{background:#F7D6E6;border-color:#E2729B} .dcell[data-v="종추"] .dc{color:#72243E}
.dcell[data-v="반추"]{background:#FCEEF5;border-color:#F0AECA} .dcell[data-v="반추"] .dc{color:#8C3055}
.dcell[data-v="종결"]{background:#FAD5D5;border-color:#E06060} .dcell[data-v="종결"] .dc{color:#7A1A1A}
.dcell[data-v="반결"]{background:#FDEEF0;border-color:#F0A5AE} .dcell[data-v="반결"] .dc{color:#9B2535}
.dcell[data-v="종지"]{background:#FAE0C8;border-color:#EB9455} .dcell[data-v="종지"] .dc{color:#7A3E0A}
.dcell[data-v="반지"]{background:#FEF0E0;border-color:#F5BC85} .dcell[data-v="반지"] .dc{color:#8C5210}
.dcell[data-v="대휴"]{background:#F1EFE8;border-color:#B4B2A9} .dcell[data-v="대휴"] .dc{color:#5F5E5A}
.dcell[data-v="조퇴"]{background:#FAEEDA;border-color:#EF9F27} .dcell[data-v="조퇴"] .dc{color:#633806}
.picker-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end}
.picker-bg.show{display:flex}
.picker{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:16px 16px 32px;max-width:600px;margin:0 auto}
.picker-handle{width:36px;height:4px;background:#e5e5e7;border-radius:2px;margin:0 auto 14px}
.picker-ttl{font-size:13px;color:#888;text-align:center;margin-bottom:14px}
.picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.popt{padding:12px 4px;text-align:center;border:1px solid #e5e5e7;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:#f9f9fb;color:#1d1d1f;font-family:inherit;-webkit-appearance:none}
.popt:active{opacity:0.7}
.popt.p-yeon{background:#D6EFCA;border-color:#7BBF40;color:#2E5C0E}
.popt.p-ban{background:#EDF7E3;border-color:#A8D87A;color:#3B6D11}
.popt.p-hyu{background:#FAECE7;border-color:#F0997B;color:#993C1D}
.popt.p-yuhyu{background:#C8EDE7;border-color:#3DAAA0;color:#14635B}
.popt.p-banyou{background:#E4F6F4;border-color:#7ECEC9;color:#1A7A71}
.popt.p-jong{background:#F7D6E6;border-color:#E2729B;color:#72243E}
.popt.p-banj{background:#FCEEF5;border-color:#F0AECA;color:#8C3055}
.popt.p-jonggyul{background:#FAD5D5;border-color:#E06060;color:#7A1A1A}
.popt.p-bangyul{background:#FDEEF0;border-color:#F0A5AE;color:#9B2535}
.popt.p-jongji{background:#FAE0C8;border-color:#EB9455;color:#7A3E0A}
.popt.p-banji{background:#FEF0E0;border-color:#F5BC85;color:#8C5210}
.popt.p-dae{background:#F1EFE8;border-color:#B4B2A9;color:#5F5E5A}
.popt.p-jot{background:#FAEEDA;border-color:#EF9F27;color:#633806}
.popt.p-clear{background:#fff;border-color:#FFD7D7;color:#D85A30}
.pin-wrap{display:flex;flex-direction:column;align-items:center;padding:32px 16px}
.pin-icon{width:52px;height:52px;background:#E6F1FB;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.pin-title{font-size:16px;font-weight:600;color:#1d1d1f;margin-bottom:4px}
.pin-sub{font-size:13px;color:#aaa;margin-bottom:24px}
.pin-dots{display:flex;gap:12px;margin-bottom:28px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#e5e5e7;transition:background 0.15s}
.pin-dot.filled{background:#1F4E79}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-btn{height:56px;border:1px solid #e5e5e7;border-radius:14px;font-size:20px;font-weight:500;cursor:pointer;background:#fff;color:#1d1d1f;display:flex;align-items:center;justify-content:center;font-family:inherit;-webkit-appearance:none}
.pin-btn:active{background:#f0f0f2;transform:scale(0.95)}
.pin-btn.del{font-size:16px;color:#888}
.sum-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.scard{background:#fff;border-radius:12px;border:1px solid #e5e5e7;padding:12px 14px}
.scard-label{font-size:11px;color:#888;margin-bottom:4px}
.scard-val{font-size:20px;font-weight:700;color:#1d1d1f}
.scard-sub{font-size:11px;color:#aaa;margin-top:2px}
.sal-wrap{background:#fff;border-radius:12px;border:1px solid #e5e5e7;overflow:hidden;margin-bottom:12px}
.sal-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f0f0f2}
.sal-row:last-child{border-bottom:none}
.sal-row.total{background:#f9f9fb}
.sal-name{font-size:13px;color:#1d1d1f;font-weight:500}
.sal-nums{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.sal-tag{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px}
.t-y{background:#EAF3DE;color:#3B6D11}
.t-b{background:#E6F1FB;color:#0C447C}
.t-h{background:#FAECE7;color:#993C1D}
.t-r{background:#FAD5D5;color:#7A1A1A}
.t-g{background:#F1EFE8;color:#5F5E5A}
.sal-pay{font-size:12px;font-weight:700;color:#1F4E79;min-width:76px;text-align:right}
.sal-header{display:flex;align-items:center;padding:8px 14px;background:#1F4E79}
.sal-header span{font-size:11px;color:#B5D4F4;font-weight:600}
.sal-header span:last-child{margin-left:auto;color:#fff}
.sal-detail{font-size:10px;color:#aaa;margin-top:2px}
.sal-ext-row{display:flex;gap:6px;padding:4px 14px 8px;background:#fafafa;border-bottom:1px solid #f0f0f2;align-items:center}
.sal-ext-label{font-size:11px;color:#888;white-space:nowrap}
.sal-ext-input{width:80px;padding:4px 6px;border:1px solid #e5e5e7;border-radius:6px;font-size:12px;text-align:right;background:#fff;font-family:inherit}
.emp-manage-card{background:#fff;border-radius:12px;border:1px solid #e5e5e7;margin-bottom:8px;overflow:hidden}
.emp-manage-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f5f5f7}
.emp-manage-row:last-child{border-bottom:none}
.emp-manage-info{flex:1}
.emp-manage-name{font-size:13px;font-weight:600;color:#1d1d1f;display:flex;align-items:center;gap:5px}
.emp-manage-sub{font-size:11px;color:#aaa;margin-top:2px}
.leave-ok{color:#3B6D11;font-weight:600}
.leave-warn{color:#D85A30;font-weight:600}
.del-btn{background:none;border:1px solid #FFD7D7;border-radius:8px;padding:5px 10px;font-size:12px;color:#D85A30;cursor:pointer;font-family:inherit}
.del-btn:active{background:#FFF0F0}
.add-form{background:#fff;border-radius:12px;border:1px solid #e5e5e7;padding:14px;margin-bottom:12px}
.add-form-title{font-size:13px;font-weight:600;color:#1d1d1f;margin-bottom:12px}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-input{flex:1;padding:10px 12px;border:1px solid #e5e5e7;border-radius:10px;font-size:13px;color:#1d1d1f;background:#f9f9fb;outline:none;font-family:inherit}
.form-input:focus{border-color:#1F4E79;background:#fff}
.form-select{padding:10px 12px;border:1px solid #e5e5e7;border-radius:10px;font-size:13px;color:#1d1d1f;background:#f9f9fb;outline:none;font-family:inherit}
.add-btn{width:100%;padding:11px;background:#1F4E79;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.add-btn:active{background:#163a5c}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5e7;padding:12px 16px;display:flex;gap:8px;z-index:18}
.save-btn{flex:1;padding:12px;background:#1F4E79;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.save-btn:active{background:#163a5c}
.export-btn{padding:12px 16px;background:#f5f5f7;color:#1d1d1f;border:1px solid #e5e5e7;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;white-space:nowrap}
.toast.show{opacity:1}
.send-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:flex-end}
.send-modal-bg.show{display:flex}
.send-modal{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:20px 16px 36px;max-width:600px;margin:0 auto}
.send-modal h3{font-size:15px;font-weight:700;color:#1d1d1f;margin-bottom:4px}
.send-modal p{font-size:12px;color:#888;margin-bottom:14px}
.send-data-box{background:#f5f5f7;border-radius:10px;padding:12px;font-size:11px;color:#444;font-family:monospace;white-space:pre;overflow-x:auto;margin-bottom:14px;line-height:1.6;border:1px solid #e5e5e7;max-height:220px;overflow-y:auto}
.send-actions{display:flex;flex-direction:column;gap:8px}
.send-share-btn{padding:13px;background:#FEE500;color:#3A1D1D;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.send-copy-btn{padding:13px;background:#1F4E79;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.send-close-btn{padding:12px;background:#f5f5f7;color:#888;border:none;border-radius:12px;font-size:13px;cursor:pointer;font-family:inherit}
.lock-row{display:flex;justify-content:flex-end;margin-bottom:8px}
.lock-btn{background:none;border:1px solid #e5e5e7;border-radius:8px;padding:5px 12px;font-size:12px;color:#888;cursor:pointer;font-family:inherit}
.section-info{font-size:11px;color:#aaa;text-align:center;padding:8px 0}
</style>
</head>
<body>

<div class="header">
  <h1>온점 을지로점</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>
</div>

<div class="main-tabs">
  <button class="mtab on" onclick="switchTab('input')">근태 입력</button>
  <button class="mtab" onclick="switchTab('salary')">급여 계산</button>
  <button class="mtab" onclick="switchTab('manage')">직원 관리</button>
</div>

<div class="content">
  <!-- 근태 입력 -->
  <div id="tab-input">
    <div class="week-nav">
      <button id="btn-prev" onclick="changeWeek(-1)">&#8592; 이전</button>
      <div class="week-center">
        <div class="week-label" id="week-label"></div>
        <span class="week-badge" id="week-badge"></span>
      </div>
      <button id="btn-next" onclick="changeWeek(1)">다음 &#8594;</button>
    </div>
    <p class="hint">날짜 칸을 눌러서 근태를 선택하세요</p>
    <div id="emp-list"></div>
  </div>

  <!-- 급여 계산 -->
  <div id="tab-salary" style="display:none">
    <div id="pin-screen">
      <div class="pin-wrap">
        <div class="pin-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0C447C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div class="pin-title">급여 계산</div>
        <div class="pin-sub">관리자 비밀번호 4자리를 입력하세요</div>
        <div class="pin-dots">
          <div class="pin-dot" id="dot0"></div><div class="pin-dot" id="dot1"></div>
          <div class="pin-dot" id="dot2"></div><div class="pin-dot" id="dot3"></div>
        </div>
        <div class="pin-pad">
          <button class="pin-btn" onclick="pinInput(1)">1</button>
          <button class="pin-btn" onclick="pinInput(2)">2</button>
          <button class="pin-btn" onclick="pinInput(3)">3</button>
          <button class="pin-btn" onclick="pinInput(4)">4</button>
          <button class="pin-btn" onclick="pinInput(5)">5</button>
          <button class="pin-btn" onclick="pinInput(6)">6</button>
          <button class="pin-btn" onclick="pinInput(7)">7</button>
          <button class="pin-btn" onclick="pinInput(8)">8</button>
          <button class="pin-btn" onclick="pinInput(9)">9</button>
          <button class="pin-btn" style="border:none;background:transparent;cursor:default"></button>
          <button class="pin-btn" onclick="pinInput(0)">0</button>
          <button class="pin-btn del" onclick="pinDelete()">&#9003;</button>
        </div>
        <div class="pin-error" id="pin-error" style="font-size:12px;color:#D85A30;margin-top:12px;min-height:18px"></div>
      </div>
    </div>
    <div id="salary-screen" style="display:none">
      <div class="lock-row">
        <button class="lock-btn" onclick="lockSalary()">잠금</button>
      </div>
      <div class="sum-cards" id="sum-cards"></div>
      <div class="sal-wrap" id="sal-wrap"></div>
      <p class="section-info">지원금·조퇴시간은 이달 급여에만 반영됩니다</p>
    </div>
  </div>

  <!-- 직원 관리 -->
  <div id="tab-manage" style="display:none">
    <div class="add-form">
      <div class="add-form-title">직원 추가</div>
      <div class="form-row">
        <input class="form-input" id="new-name" placeholder="이름" />
        <select class="form-select" id="new-group">
          <option value="">일반</option>
          <option value="B">B조</option>
        </select>
      </div>
      <div class="form-row">
        <input class="form-input" id="new-leave" type="number" placeholder="연차 일수" value="15" />
        <select class="form-select" id="new-weekdays">
          <option value="5">주5일 (월-금)</option>
          <option value="5.5">주5.5일 (월-토 격주)</option>
        </select>
      </div>
      <div class="form-row">
        <input class="form-input" id="new-dailyh" type="number" placeholder="일 근무시간 (예: 8, 4.5)" value="8" step="0.5" />
        <input class="form-input" id="new-salary" type="number" placeholder="기본급 (월급, 원)" />
      </div>
      <button class="add-btn" onclick="addEmployee()">추가하기</button>
    </div>
    <div class="emp-manage-card" id="manage-list"></div>
  </div>
</div>

<div class="save-bar">
  <button class="export-btn" onclick="exportSummaryCSV()">이번달 데이터 전송</button>
  <button class="save-btn" onclick="saveData()">저장</button>
</div>

<div class="picker-bg" id="picker-bg">
  <div class="picker">
    <div class="picker-handle"></div>
    <div class="picker-ttl" id="picker-ttl"></div>
    <div class="picker-grid">
      <button class="popt p-yeon" onclick="pick('연차')">연차</button>
      <button class="popt p-ban" onclick="pick('반차')">반차</button>
      <button class="popt p-jong" onclick="pick('종추')">종추</button>
      <button class="popt p-banj" onclick="pick('반추')">반추</button>
      <button class="popt p-hyu" onclick="pick('휴무')">휴무</button>
      <button class="popt p-dae" onclick="pick('대휴')">대휴</button>
      <button class="popt p-jonggyul" onclick="pick('종결')">종결</button>
      <button class="popt p-bangyul" onclick="pick('반결')">반결</button>
      <button class="popt p-yuhyu" onclick="pick('유후')">유후</button>
      <button class="popt p-banyou" onclick="pick('반유')">반유</button>
      <button class="popt p-jongji" onclick="pick('종지')">종지</button>
      <button class="popt p-banji" onclick="pick('반지')">반지</button>
      <button class="popt p-jot" onclick="pick('조퇴')">조퇴</button>
      <button class="popt p-clear" onclick="pick('')">지우기</button>
    </div>
  </div>
</div>

<div class="send-modal-bg" id="send-modal-bg">
  <div class="send-modal">
    <h3 id="send-modal-title"></h3>
    <p id="send-modal-sub"></p>
    <div class="send-data-box" id="send-data-box"></div>
    <div class="send-actions">
      <button class="send-share-btn" id="send-kakao-btn" onclick="shareData()">&#128228; 카카오톡 / 문자로 전송</button>
      <button class="send-copy-btn" onclick="copyData()">&#128203; 데이터 복사</button>
      <button class="send-close-btn" onclick="closeSendModal()">닫기</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const PIN='1234';
// 근로시간 환산 (급여대장 공식: 환산 = (소정+주휴+초과×1.5)×4.35)
function calcHwansan(weekDays, dailyH){
  const weekH=weekDays*dailyH, sojeong=Math.min(weekH,40), overH=Math.max(0,weekH-40), juhyu=dailyH;
  return Math.round((sojeong+juhyu+overH*1.5)*4.35*10)/10;
}
const DOW=['일','월','화','수','목','금','토'];
const EMPS_KEY='emps_온점';
const ATT_KEY='att_온점';
const SALEXT_KEY='salext_온점';

const _now=new Date(); let curY=_now.getFullYear(), curM=_now.getMonth()+1, curWeek=0, curTab='input', pickerTarget=null, pinVal='';

// localStorage 안전 래퍼
function lsGet(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

let emps=lsGet(EMPS_KEY,[]);
// 구버전 마이그레이션
emps=emps.map(emp=>{
  let weekDays=emp.weekDays||5, dailyH=emp.dailyH||8;
  if(!emp.weekDays&&emp.workType==='주5.5일'){weekDays=5.5;}
  return{...emp,salary:emp.salary||0,weekDays,dailyH};
});
let att=lsGet(ATT_KEY,{});
let salExtras=lsGet(SALEXT_KEY,{});

function daysInMonth(y,m){return new Date(y,m,0).getDate()}
function isSun(y,m,d){return new Date(y,m-1,d).getDay()===0}
function isSat(y,m,d){return new Date(y,m-1,d).getDay()===6}
function dw(y,m,d){return DOW[new Date(y,m-1,d).getDay()]}
function key(n,y,m,d){return `${n}_${y}_${m}_${d}`}

function getWeeks(y,m){
  const total=daysInMonth(y,m),weeks=[],firstDow=new Date(y,m-1,1).getDay();
  let end=firstDow===0?1:1+(7-firstDow);end=Math.min(end,total);
  const w0=[];for(let d=1;d<=end;d++)w0.push(d);weeks.push(w0);
  let day=end+1;while(day<=total){const w=[];for(let i=0;i<7&&day<=total;i++,day++)w.push(day);weeks.push(w);}
  return weeks;
}

function changeMonth(dir){curM+=dir;if(curM>12){curM=1;curY++}if(curM<1){curM=12;curY--}curWeek=0;renderAll();}
function changeWeek(dir){const wks=getWeeks(curY,curM);curWeek=Math.max(0,Math.min(wks.length-1,curWeek+dir));renderInput();}

function switchTab(t){
  curTab=t;
  ['input','salary','manage'].forEach(id=>{document.getElementById('tab-'+id).style.display=id===t?'block':'none';});
  document.querySelectorAll('.mtab').forEach((el,i)=>el.classList.toggle('on',['input','salary','manage'][i]===t));
  if(t==='salary'){document.getElementById('pin-screen').style.display='block';document.getElementById('salary-screen').style.display='none';pinVal='';updateDots();}
  if(t==='manage')renderManage();
}

function renderHeader(){document.getElementById('month-label').textContent=`${curY}년 ${curM}월`;}

function renderInput(){
  const wks=getWeeks(curY,curM),wk=wks[curWeek]||[],s=wk[0],e=wk[wk.length-1];
  document.getElementById('week-label').textContent=`${curM}/${s}(${dw(curY,curM,s)}) — ${curM}/${e}(${dw(curY,curM,e)})`;
  document.getElementById('week-badge').textContent=`${curWeek+1}주차`;
  document.getElementById('btn-prev').disabled=curWeek===0;
  document.getElementById('btn-next').disabled=curWeek===getWeeks(curY,curM).length-1;
  if(emps.length===0){
    document.getElementById('emp-list').innerHTML=`<div style="text-align:center;padding:48px 16px;color:#aaa"><div style="font-size:36px;margin-bottom:12px">&#128100;</div><div style="font-size:14px;font-weight:600;color:#888;margin-bottom:6px">등록된 직원이 없어요</div><div style="font-size:12px">'직원 관리' 탭에서 직원을 추가해주세요</div></div>`;
    return;
  }
  document.getElementById('emp-list').innerHTML=emps.map(emp=>{
    const cells=wk.map(d=>{
      const v=isSun(curY,curM,d)?'휴무':(att[key(emp.n,curY,curM,d)]||'');
      const cls=isSun(curY,curM,d)?'sun':isSat(curY,curM,d)?'sat':'';
      const onclick=!isSun(curY,curM,d)?` onclick="openPicker('${emp.n}',${d})"`:'' ;
      return `<div class="dcell ${cls}"${v&&!isSun(curY,curM,d)?' data-v="'+v+'"':''}${onclick}><span class="dd">${d}</span><span class="dn">${dw(curY,curM,d)}</span><span class="dc">${isSun(curY,curM,d)?'휴무':(v||'')}</span></div>`;
    }).join('');
    const hwLabel=`주${emp.weekDays||5}일·${emp.dailyH||8}h`;
    return `<div class="emp-card"><div class="emp-head"><span class="emp-nm">${emp.n}</span><span class="badge-n">${hwLabel}</span></div><div class="days-wrap">${cells}</div></div>`;
  }).join('');
}

function openPicker(name,day){
  pickerTarget={name,day};
  document.getElementById('picker-ttl').textContent=`${name}  ${curM}월 ${day}일(${dw(curY,curM,day)}) 근태 선택`;
  document.getElementById('picker-bg').classList.add('show');
}
document.getElementById('picker-bg').addEventListener('click',e=>{if(e.target===document.getElementById('picker-bg'))closePicker();});
function closePicker(){document.getElementById('picker-bg').classList.remove('show');}

function pick(v){
  if(pickerTarget){const k=key(pickerTarget.name,curY,curM,pickerTarget.day);if(v)att[k]=v;else delete att[k];renderInput();}
  closePicker();
}

function pinInput(n){
  if(pinVal.length>=4)return;pinVal+=String(n);updateDots();
  if(pinVal.length===4){setTimeout(()=>{
    if(pinVal===PIN){document.getElementById('pin-screen').style.display='none';document.getElementById('salary-screen').style.display='block';renderSalary();}
    else{document.getElementById('pin-error').textContent='비밀번호가 틀렸어요';setTimeout(()=>{pinVal='';updateDots();document.getElementById('pin-error').textContent='';},800);}
    pinVal='';updateDots();},150);}
}
function pinDelete(){pinVal=pinVal.slice(0,-1);updateDots();document.getElementById('pin-error').textContent='';}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('dot'+i).classList.toggle('filled',i<pinVal.length);}
function lockSalary(){document.getElementById('salary-screen').style.display='none';document.getElementById('pin-screen').style.display='block';pinVal='';updateDots();}

// ── 급여 계산 핵심 함수 ──────────────────────────────────────
function calcEmpPay(emp, y, m, support, jotaeH){
  const salary=emp.salary||0;
  const weekDays=emp.weekDays||5, dailyH=emp.dailyH||8;
  const weekH=weekDays*dailyH, sojeong=Math.min(weekH,40), juhyu=dailyH;
  const hwansan=calcHwansan(weekDays,dailyH);
  const sojeongMonthly=(sojeong+juhyu)*4.35;
  const hourly=hwansan>0?Math.round(salary*sojeongMonthly/(hwansan*hwansan)):0;
  const daily=hourly*dailyH;

  const total=daysInMonth(y,m);
  let jongchu=0,banchu=0,jonggyul=0,bangyul=0;
  for(let d=1;d<=total;d++){
    if(isSun(y,m,d))continue;
    const v=att[key(emp.n,y,m,d)]||'';
    if(v==='종추')jongchu++;
    else if(v==='반추')banchu++;
    else if(v==='종결')jonggyul++;
    else if(v==='반결')bangyul++;
  }
  const extra=Math.round(jongchu*daily*1.5+banchu*(daily/2)*1.5);
  const deduct=Math.round(-(jonggyul*daily+bangyul*(daily/2)+(jotaeH||0)*hourly));
  return {salary,hourly,daily,jongchu,banchu,jonggyul,bangyul,extra,deduct,support:support||0,finalPay:salary+extra+deduct+(support||0)};
}

function calcLeave(emp){
  let used=0,earned=0;
  Object.entries(att).forEach(([k,v])=>{
    if(!k.startsWith(emp.n+'_'))return;
    if(v==='연차')used++;else if(v==='반차')used+=0.5;else if(v==='대휴')earned+=1.5;
  });
  return{total:emp.leave||0,used,earned,remaining:Math.max(0,(emp.leave||0)-used+earned)};
}

function getSalExt(name,y,m){return salExtras[`${name}_${y}_${m}`]||{support:0,jotaeH:0};}
function setSalExt(name,y,m,data){salExtras[`${name}_${y}_${m}`]=data;lsSet(SALEXT_KEY,salExtras);}

function updateSalExt(name,field,value){
  const ext=getSalExt(name,curY,curM);
  ext[field]=parseFloat(value)||0;
  setSalExt(name,curY,curM,ext);
  renderSalary();
}

function renderSalary(){
  let totFinal=0,totExtra=0,totDeduct=0;
  const rows=emps.map(emp=>{
    const ext=getSalExt(emp.n,curY,curM);
    const p=calcEmpPay(emp,curY,curM,ext.support,ext.jotaeH);
    const lv=calcLeave(emp);
    totFinal+=p.finalPay;totExtra+=p.extra;totDeduct+=p.deduct;
    const lvClass=lv.remaining<=3?'leave-warn':'leave-ok';

    const tags=[
      p.jongchu?`<span class="sal-tag t-b">종추${p.jongchu}</span>`:'',
      p.banchu?`<span class="sal-tag t-b">반추${p.banchu}</span>`:'',
      p.jonggyul?`<span class="sal-tag t-r">종결${p.jonggyul}</span>`:'',
      p.bangyul?`<span class="sal-tag t-r">반결${p.bangyul}</span>`:'',
    ].filter(Boolean).join('');

    const parts=[];
    if(p.extra)parts.push(`+${p.extra.toLocaleString()}`);
    if(p.deduct)parts.push(`${p.deduct.toLocaleString()}`);
    if(p.support)parts.push(`지원+${p.support.toLocaleString()}`);
    const detail=parts.length?`기본 ${p.salary.toLocaleString()} ${parts.join(' ')}`:p.salary?`기본 ${p.salary.toLocaleString()}`:'기본급 미입력';

    return `<div class="sal-row">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="sal-name">${emp.n}</span>
          <span class="badge-n ${lvClass}" style="font-size:9px">연차${lv.remaining}일</span>
        </div>
        <div class="sal-detail">${detail}</div>
      </div>
      <div class="sal-nums">${tags}<span class="sal-pay">${p.finalPay.toLocaleString()}원</span></div>
    </div>
    <div class="sal-ext-row">
      <span class="sal-ext-label">지원금</span>
      <input class="sal-ext-input" type="number" placeholder="0" value="${ext.support||''}" oninput="updateSalExt('${emp.n}','support',this.value)" step="10000">
      <span class="sal-ext-label" style="margin-left:8px">조퇴</span>
      <input class="sal-ext-input" type="number" placeholder="0h" value="${ext.jotaeH||''}" oninput="updateSalExt('${emp.n}','jotaeH',this.value)" step="0.5" style="width:60px">
      <span class="sal-ext-label">h</span>
    </div>`;
  }).join('');

  document.getElementById('sum-cards').innerHTML=`
    <div class="scard"><div class="scard-label">전체 급여 합계</div><div class="scard-val">${Math.round(totFinal/10000)}만원</div><div class="scard-sub">${totFinal.toLocaleString()}원</div></div>
    <div class="scard"><div class="scard-label">추가 / 차감</div><div class="scard-val" style="font-size:15px">${totExtra?'+'+Math.round(totExtra/10000)+'만':'-'}</div><div class="scard-sub">${totDeduct?totDeduct.toLocaleString()+'원 차감':''}</div></div>`;
  document.getElementById('sal-wrap').innerHTML=`
    <div class="sal-header"><span>이름 · 잔여연차</span><span>급여</span></div>${rows}
    <div class="sal-row total"><span class="sal-name" style="font-weight:700">합계</span><div class="sal-nums"><span class="sal-pay" style="font-size:13px">${totFinal.toLocaleString()}원</span></div></div>`;
}

function renderManage(){
  document.getElementById('manage-list').innerHTML=emps.length===0
    ?'<div style="padding:24px;text-align:center;color:#aaa;font-size:13px">등록된 직원이 없어요</div>'
    :emps.map((emp,i)=>{
      const lv=calcLeave(emp);
      const lvClass=lv.remaining<=3?'leave-warn':'leave-ok';
      return `<div class="emp-manage-row">
        <div class="emp-manage-info">
          <div class="emp-manage-name">${emp.n}<span class="badge-b" style="font-weight:400">주${emp.weekDays||5}일·${emp.dailyH||8}h</span></div>
          <div class="emp-manage-sub">기본급 ${(emp.salary||0).toLocaleString()}원 · 연차 <span class="${lvClass}">${lv.remaining}</span>/${emp.leave}일 · 환산 ${calcHwansan(emp.weekDays||5,emp.dailyH||8)}h</div>
        </div>
        <button class="del-btn" onclick="removeEmployee(${i})">삭제</button>
      </div>`;
    }).join('');
}

function addEmployee(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){showToast('이름을 입력해주세요');return;}
  const group=document.getElementById('new-group').value;
  const leave=parseInt(document.getElementById('new-leave').value)||15;
  const weekDays=parseFloat(document.getElementById('new-weekdays').value)||5;
  const dailyH=parseFloat(document.getElementById('new-dailyh').value)||8;
  const salary=parseInt(document.getElementById('new-salary').value)||0;
  emps.push({n:name,g:group,leave,salary,weekDays,dailyH});
  document.getElementById('new-name').value='';
  document.getElementById('new-salary').value='';
  document.getElementById('new-dailyh').value='8';
  saveData(true);renderManage();
  showToast(`${name} 추가 완료!`);
}

function removeEmployee(i){
  const name=emps[i].n;
  if(!confirm(`${name}을(를) 삭제할까요?`))return;
  emps.splice(i,1);saveData(true);renderManage();showToast(`${name} 삭제 완료`);
}

function saveData(silent){
  lsSet(EMPS_KEY,emps);lsSet(ATT_KEY,att);
  if(!silent)showToast('저장 완료!');
}

let _lastCsvText='';

function exportSummaryCSV(){
  const total=daysInMonth(curY,curM);
  const types=['연차','반차','종추','반추','휴무','대휴','종결','반결','유후','반유','종지','반지','조퇴'];
  const header='이름,연차,반차,종추,반추,휴무,대휴,종결,반결,유후,반유,종지,반지,조퇴(h)';
  let rows=[header];
  emps.forEach(emp=>{
    const cnt={};types.forEach(t=>cnt[t]=0);
    for(let d=1;d<=total;d++){
      if(isSun(curY,curM,d))continue;
      const v=att[key(emp.n,curY,curM,d)]||'';
      if(v&&cnt[v]!==undefined)cnt[v]++;
    }
    rows.push([emp.n,cnt['연차'],cnt['반차'],cnt['종추'],cnt['반추'],cnt['휴무'],cnt['대휴'],cnt['종결'],cnt['반결'],cnt['유후'],cnt['반유'],cnt['종지'],cnt['반지'],cnt['조퇴']].join(','));
  });
  _lastCsvText=rows.join('\n');
  document.getElementById('send-modal-title').textContent=`${curY}년 ${curM}월 근태 데이터`;
  document.getElementById('send-modal-sub').textContent='아래 데이터를 복사하거나 카카오톡으로 전송하세요';
  document.getElementById('send-data-box').textContent=_lastCsvText;
  const shareBtn=document.getElementById('send-kakao-btn');
  if(navigator.share){shareBtn.style.display='block';}else{shareBtn.style.display='none';}
  document.getElementById('send-modal-bg').classList.add('show');
}

function shareData(){
  if(navigator.share){navigator.share({title:`${curY}년 ${curM}월 근태 데이터`,text:_lastCsvText}).catch(()=>{});}
}

function copyData(){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(_lastCsvText).then(()=>showToast('복사 완료! 구글시트에 붙여넣기 하세요')).catch(()=>fallbackCopy());
  }else{fallbackCopy();}
}

function fallbackCopy(){
  const box=document.getElementById('send-data-box');
  const range=document.createRange();range.selectNodeContents(box);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  try{document.execCommand('copy');showToast('복사 완료!');}catch(e){showToast('위 텍스트를 직접 선택해서 복사하세요');}
}

function closeSendModal(){document.getElementById('send-modal-bg').classList.remove('show');}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function renderAll(){renderHeader();renderInput();}
renderAll();
</script>
</body>
