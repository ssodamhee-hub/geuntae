<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>온점 을지로점 근태 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.header{background:#1F4E79;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.header h1{color:#fff;font-size:15px;font-weight:600}
.month-nav{display:flex;align-items:center;gap:10px}
.month-nav button{background:rgba(255,255,255,0.15);border:none;border-radius:6px;width:28px;height:28px;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:rgba(255,255,255,0.3)}
.month-nav span{color:#fff;font-size:14px;font-weight:600;min-width:70px;text-align:center}
.main-tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5e7;position:sticky;top:47px;z-index:19}
.mtab{flex:1;padding:11px 8px;text-align:center;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent}
.mtab.on{color:#1F4E79;border-bottom:2px solid #1F4E79;font-weight:600}
.content{padding:12px 16px;padding-bottom:80px}
.week-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:9px 12px;margin-bottom:10px;border:1px solid #e5e5e7}
.week-nav button{background:#f5f5f7;border:none;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;color:#1d1d1f;font-weight:500}
.week-nav button:active{background:#e5e5e7}
.week-nav button:disabled{color:#ccc;background:#f5f5f7}
.week-center{text-align:center}
.week-label{font-size:13px;font-weight:600;color:#1d1d1f}
.week-badge{display:inline-block;margin-top:3px;font-size:10px;background:#E6F1FB;color:#0C447C;border-radius:4px;padding:2px 7px;font-weight:600}
.hint{font-size:11px;color:#aaa;text-align:center;margin-bottom:8px}
.emp-card{background:#fff;border-radius:12px;border:1px solid #e5e5e7;margin-bottom:8px;overflow:hidden}
.emp-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f9f9fb;border-bottom:1px solid #e5e5e7}
.emp-nm{font-size:13px;font-weight:600;color:#1d1d1f}
.badge-b{font-size:10px;background:#E6F1FB;color:#0C447C;border-radius:4px;padding:2px 6px;font-weight:600}
.badge-n{font-size:10px;color:#aaa}
.days-wrap{padding:8px 10px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.days-wrap::-webkit-scrollbar{display:none}
.dcell{flex:0 0 42px;height:50px;border:1px solid #e5e5e7;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#f9f9fb;user-select:none}
.dcell:active{opacity:0.6;transform:scale(0.95)}
.dcell.sun{background:#FFF0F0;border-color:#FFD7D7;cursor:default}
.dcell.sat{background:#EEF5FF;border-color:#C8DFF8}
.dcell .dd{font-size:11px;font-weight:600;color:#1d1d1f;line-height:1.3}
.dcell.sun .dd{color:#D85A30}
.dcell.sat .dd{color:#185FA5}
.dcell .dn{font-size:9px;color:#aaa;line-height:1.3}
.dcell.sun .dn{color:#D85A30}
.dcell.sat .dn{color:#185FA5}
.dcell .dc{font-size:9px;font-weight:700;margin-top:1px;min-height:11px;line-height:1}
/* 연차·반차 – 초록 계열 */
.dcell[data-v="연차"]{background:#D6EFCA;border-color:#7BBF40} .dcell[data-v="연차"] .dc{color:#2E5C0E}
.dcell[data-v="반차"]{background:#EDF7E3;border-color:#A8D87A} .dcell[data-v="반차"] .dc{color:#3B6D11}
/* 휴무 – 단독 주황 */
.dcell[data-v="휴무"]{background:#FAECE7;border-color:#F0997B} .dcell[data-v="휴무"] .dc{color:#993C1D}
/* 유휴·반유 – 민트/청록 계열 */
.dcell[data-v="유후"]{background:#C8EDE7;border-color:#3DAAA0} .dcell[data-v="유후"] .dc{color:#14635B}
.dcell[data-v="반유"]{background:#E4F6F4;border-color:#7ECEC9} .dcell[data-v="반유"] .dc{color:#1A7A71}
/* 종추·반추 – 핑크 계열 */
.dcell[data-v="종추"]{background:#F7D6E6;border-color:#E2729B} .dcell[data-v="종추"] .dc{color:#72243E}
.dcell[data-v="반추"]{background:#FCEEF5;border-color:#F0AECA} .dcell[data-v="반추"] .dc{color:#8C3055}
/* 종결·반결 – 빨강 계열 */
.dcell[data-v="종결"]{background:#FAD5D5;border-color:#E06060} .dcell[data-v="종결"] .dc{color:#7A1A1A}
.dcell[data-v="반결"]{background:#FDEEF0;border-color:#F0A5AE} .dcell[data-v="반결"] .dc{color:#9B2535}
/* 종지·반지 – 오렌지 계열 */
.dcell[data-v="종지"]{background:#FAE0C8;border-color:#EB9455} .dcell[data-v="종지"] .dc{color:#7A3E0A}
.dcell[data-v="반지"]{background:#FEF0E0;border-color:#F5BC85} .dcell[data-v="반지"] .dc{color:#8C5210}
/* 대휴 – 단독 회색 */
.dcell[data-v="대휴"]{background:#F1EFE8;border-color:#B4B2A9} .dcell[data-v="대휴"] .dc{color:#5F5E5A}
/* 조퇴 – 단독 노란/앰버 */
.dcell[data-v="조퇴"]{background:#FAEEDA;border-color:#EF9F27} .dcell[data-v="조퇴"] .dc{color:#633806}
.picker-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end}
.picker-bg.show{display:flex}
.picker{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:16px 16px 32px;max-width:600px;margin:0 auto}
.picker-handle{width:36px;height:4px;background:#e5e5e7;border-radius:2px;margin:0 auto 14px}
.picker-ttl{font-size:13px;color:#888;text-align:center;margin-bottom:14px}
.picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.popt{padding:12px 4px;text-align:center;border:1px solid #e5e5e7;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:#f9f9fb;color:#1d1d1f}
.popt:active{opacity:0.7}
/* 연차·반차 – 초록 */
.popt.p-yeon{background:#D6EFCA;border-color:#7BBF40;color:#2E5C0E}
.popt.p-ban{background:#EDF7E3;border-color:#A8D87A;color:#3B6D11}
/* 휴무 */
.popt.p-hyu{background:#FAECE7;border-color:#F0997B;color:#993C1D}
/* 유휴·반유 – 민트 */
.popt.p-yuhyu{background:#C8EDE7;border-color:#3DAAA0;color:#14635B}
.popt.p-banyou{background:#E4F6F4;border-color:#7ECEC9;color:#1A7A71}
/* 종추·반추 – 핑크 */
.popt.p-jong{background:#F7D6E6;border-color:#E2729B;color:#72243E}
.popt.p-banj{background:#FCEEF5;border-color:#F0AECA;color:#8C3055}
/* 종결·반결 – 빨강 */
.popt.p-jonggyul{background:#FAD5D5;border-color:#E06060;color:#7A1A1A}
.popt.p-bangyul{background:#FDEEF0;border-color:#F0A5AE;color:#9B2535}
/* 종지·반지 – 오렌지 */
.popt.p-jongji{background:#FAE0C8;border-color:#EB9455;color:#7A3E0A}
.popt.p-banji{background:#FEF0E0;border-color:#F5BC85;color:#8C5210}
/* 대휴 */
.popt.p-dae{background:#F1EFE8;border-color:#B4B2A9;color:#5F5E5A}
/* 조퇴 */
.popt.p-jot{background:#FAEEDA;border-color:#EF9F27;color:#633806}
.popt.p-clear{background:#fff;border-color:#FFD7D7;color:#D85A30}
.pin-wrap{display:flex;flex-direction:column;align-items:center;padding:32px 16px}
.pin-icon{width:52px;height:52px;background:#E6F1FB;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.pin-title{font-size:16px;font-weight:600;color:#1d1d1f;margin-bottom:4px}
.pin-sub{font-size:13px;color:#aaa;margin-bottom:24px}
.pin-dots{display:flex;gap:12px;margin-bottom:28px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#e5e5e7;transition:background 0.15s}
.pin-dot.filled{background:#1F4E79}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-btn{height:56px;border:1px solid #e5e5e7;border-radius:14px;font-size:20px;font-weight:500;cursor:pointer;background:#fff;color:#1d1d1f;display:flex;align-items:center;justify-content:center}
.pin-btn:active{background:#f0f0f2;transform:scale(0.95)}
.pin-btn.del{font-size:16px;color:#888}
.pin-btn.empty{border:none;background:transparent;cursor:default}
.pin-error{font-size:12px;color:#D85A30;margin-top:12px;min-height:18px}
.sum-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.scard{background:#fff;border-radius:12px;border:1px solid #e5e5e7;padding:12px 14px}
.scard-label{font-size:11px;color:#888;margin-bottom:4px}
.scard-val{font-size:20px;font-weight:700;color:#1d1d1f}
.scard-sub{font-size:11px;color:#aaa;margin-top:2px}
.sal-wrap{background:#fff;border-radius:12px;border:1px solid #e5e5e7;overflow:hidden}
.sal-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f0f0f2}
.sal-row:last-child{border-bottom:none}
.sal-row.total{background:#f9f9fb}
.sal-name{flex:1;font-size:13px;color:#1d1d1f;font-weight:500}
.sal-nums{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.sal-tag{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px}
.t-y{background:#EAF3DE;color:#3B6D11}
.t-b{background:#E6F1FB;color:#0C447C}
.t-h{background:#FAECE7;color:#993C1D}
.sal-pay{font-size:12px;font-weight:700;color:#1F4E79;min-width:76px;text-align:right}
.sal-header{display:flex;align-items:center;padding:8px 14px;background:#1F4E79}
.sal-header span{font-size:11px;color:#B5D4F4;font-weight:600}
.sal-header span:last-child{margin-left:auto;color:#fff}
.emp-manage-card{background:#fff;border-radius:12px;border:1px solid #e5e5e7;margin-bottom:8px;overflow:hidden}
.emp-manage-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f5f5f7}
.emp-manage-row:last-child{border-bottom:none}
.emp-manage-info{flex:1}
.emp-manage-name{font-size:13px;font-weight:600;color:#1d1d1f}
.emp-manage-sub{font-size:11px;color:#aaa;margin-top:2px}
.del-btn{background:none;border:1px solid #FFD7D7;border-radius:8px;padding:5px 10px;font-size:12px;color:#D85A30;cursor:pointer}
.del-btn:active{background:#FFF0F0}
.add-form{background:#fff;border-radius:12px;border:1px solid #e5e5e7;padding:14px;margin-bottom:12px}
.add-form-title{font-size:13px;font-weight:600;color:#1d1d1f;margin-bottom:12px}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-input{flex:1;padding:10px 12px;border:1px solid #e5e5e7;border-radius:10px;font-size:13px;color:#1d1d1f;background:#f9f9fb;outline:none}
.form-input:focus{border-color:#1F4E79;background:#fff}
.form-select{padding:10px 12px;border:1px solid #e5e5e7;border-radius:10px;font-size:13px;color:#1d1d1f;background:#f9f9fb;outline:none}
.add-btn{width:100%;padding:11px;background:#1F4E79;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.add-btn:active{background:#163a5c}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5e7;padding:12px 16px;display:flex;gap:8px;z-index:18}
.save-btn{flex:1;padding:12px;background:#1F4E79;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.save-btn:active{background:#163a5c}
.export-btn{padding:12px 16px;background:#f5f5f7;color:#1d1d1f;border:1px solid #e5e5e7;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;white-space:nowrap}
.toast.show{opacity:1}
.send-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:flex-end}
.send-modal-bg.show{display:flex}
.send-modal{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:20px 16px 36px;max-width:600px;margin:0 auto}
.send-modal h3{font-size:15px;font-weight:700;color:#1d1d1f;margin-bottom:4px}
.send-modal p{font-size:12px;color:#888;margin-bottom:14px}
.send-data-box{background:#f5f5f7;border-radius:10px;padding:12px;font-size:11px;color:#444;font-family:monospace;white-space:pre;overflow-x:auto;margin-bottom:14px;line-height:1.6;border:1px solid #e5e5e7;max-height:220px;overflow-y:auto}
.send-actions{display:flex;flex-direction:column;gap:8px}
.send-share-btn{padding:13px;background:#FEE500;color:#3A1D1D;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.send-copy-btn{padding:13px;background:#1F4E79;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.send-close-btn{padding:12px;background:#f5f5f7;color:#888;border:none;border-radius:12px;font-size:13px;cursor:pointer}
.lock-row{display:flex;justify-content:flex-end;margin-bottom:8px}
.lock-btn{background:none;border:1px solid #e5e5e7;border-radius:8px;padding:5px 12px;font-size:12px;color:#888;cursor:pointer}
.section-info{font-size:11px;color:#aaa;text-align:center;padding:8px 0}
</style>
</head>
<body>

<div class="header">
  <h1>온점 을지로점</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>
</div>

<div class="main-tabs">
  <div class="mtab on" onclick="switchTab('input')">근태 입력</div>
  <div class="mtab" onclick="switchTab('salary')">급여 계산</div>
  <div class="mtab" onclick="switchTab('manage')">직원 관리</div>
</div>

<div class="content">
  <!-- 근태 입력 -->
  <div id="tab-input">
    <div class="week-nav">
      <button id="btn-prev" onclick="changeWeek(-1)">&#8592; 이전</button>
      <div class="week-center">
        <div class="week-label" id="week-label"></div>
        <span class="week-badge" id="week-badge"></span>
      </div>
      <button id="btn-next" onclick="changeWeek(1)">다음 &#8594;</button>
    </div>
    <p class="hint">날짜 칸을 눌러서 근태를 선택하세요</p>
    <div id="emp-list"></div>
  </div>

  <!-- 급여 계산 -->
  <div id="tab-salary" style="display:none">
    <div id="pin-screen">
      <div class="pin-wrap">
        <div class="pin-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0C447C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div class="pin-title">급여 계산</div>
        <div class="pin-sub">관리자 비밀번호 4자리를 입력하세요</div>
        <div class="pin-dots">
          <div class="pin-dot" id="dot0"></div><div class="pin-dot" id="dot1"></div>
          <div class="pin-dot" id="dot2"></div><div class="pin-dot" id="dot3"></div>
        </div>
        <div class="pin-pad">
          <div class="pin-btn" onclick="pinInput(1)">1</div>
          <div class="pin-btn" onclick="pinInput(2)">2</div>
          <div class="pin-btn" onclick="pinInput(3)">3</div>
          <div class="pin-btn" onclick="pinInput(4)">4</div>
          <div class="pin-btn" onclick="pinInput(5)">5</div>
          <div class="pin-btn" onclick="pinInput(6)">6</div>
          <div class="pin-btn" onclick="pinInput(7)">7</div>
          <div class="pin-btn" onclick="pinInput(8)">8</div>
          <div class="pin-btn" onclick="pinInput(9)">9</div>
          <div class="pin-btn empty"></div>
          <div class="pin-btn" onclick="pinInput(0)">0</div>
          <div class="pin-btn del" onclick="pinDelete()">&#9003;</div>
        </div>
        <div class="pin-error" id="pin-error"></div>
      </div>
    </div>
    <div id="salary-screen" style="display:none">
      <div class="lock-row">
        <button class="lock-btn" onclick="lockSalary()">잠금</button>
      </div>
      <div class="sum-cards" id="sum-cards"></div>
      <div class="sal-wrap" id="sal-wrap"></div>
      <p class="section-info">시급 10,030원 · 일 8시간 · 반차 4시간 기준 / 일요일 제외</p>
    </div>
  </div>

  <!-- 직원 관리 -->
  <div id="tab-manage" style="display:none">
    <div class="add-form">
      <div class="add-form-title">직원 추가</div>
      <div class="form-row">
        <input class="form-input" id="new-name" placeholder="이름" />
        <select class="form-select" id="new-group">
          <option value="">일반</option>
          <option value="B">B조</option>
        </select>
      </div>
      <div class="form-row">
        <input class="form-input" id="new-leave" type="number" placeholder="연차 일수" value="15" />
        <input class="form-input" id="new-hourly" type="number" placeholder="시급 (기본:10030)" />
      </div>
      <button class="add-btn" onclick="addEmployee()">추가하기</button>
    </div>
    <div class="emp-manage-card" id="manage-list"></div>
  </div>
</div>

<div class="save-bar">
  <button class="export-btn" onclick="exportSummaryCSV()">이번달 데이터 전송</button>
  <button class="save-btn" onclick="saveData()">저장</button>
</div>

<div class="picker-bg" id="picker-bg">
  <div class="picker">
    <div class="picker-handle"></div>
    <div class="picker-ttl" id="picker-ttl"></div>
    <div class="picker-grid">
      <div class="popt p-yeon" onclick="pick('연차')">연차</div>
      <div class="popt p-ban" onclick="pick('반차')">반차</div>
      <div class="popt p-jong" onclick="pick('종추')">종추</div>
      <div class="popt p-banj" onclick="pick('반추')">반추</div>
      <div class="popt p-hyu" onclick="pick('휴무')">휴무</div>
      <div class="popt p-dae" onclick="pick('대휴')">대휴</div>
      <div class="popt p-jonggyul" onclick="pick('종결')">종결</div>
      <div class="popt p-bangyul" onclick="pick('반결')">반결</div>
      <div class="popt p-yuhyu" onclick="pick('유후')">유후</div>
      <div class="popt p-banyou" onclick="pick('반유')">반유</div>
      <div class="popt p-jongji" onclick="pick('종지')">종지</div>
      <div class="popt p-banji" onclick="pick('반지')">반지</div>
      <div class="popt p-jot" onclick="pick('조퇴')">조퇴</div>
      <div class="popt p-clear" onclick="pick('')">지우기</div>
    </div>
  </div>
</div>

<div class="send-modal-bg" id="send-modal-bg">
  <div class="send-modal">
    <h3 id="send-modal-title"></h3>
    <p id="send-modal-sub"></p>
    <div class="send-data-box" id="send-data-box"></div>
    <div class="send-actions">
      <button class="send-share-btn" id="send-kakao-btn" onclick="shareData()">📤 카카오톡으로 전송</button>
      <button class="send-copy-btn" onclick="copyData()">📋 데이터 복사</button>
      <button class="send-close-btn" onclick="closeSendModal()">닫기</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const PIN='1234';
const HOURLY_DEFAULT=10030, DH=8, HH=4;
const DOW=['일','월','화','수','목','금','토'];
const EMPS_KEY='emps_온점';
const ATT_KEY='att_온점';

let curY=2026, curM=4, curWeek=0, curTab='input', pickerTarget=null, pinVal='';

// localStorage 안전 래퍼 (카카오톡 인앱 브라우저 등 제한 환경 대응)
function lsGet(key, fallback){
  try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; }
  catch(e){ return fallback; }
}
function lsSet(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }
  catch(e){}
}

let emps = lsGet(EMPS_KEY, []);
let att  = lsGet(ATT_KEY, {});

function daysInMonth(y,m){return new Date(y,m,0).getDate()}
function isSun(y,m,d){return new Date(y,m-1,d).getDay()===0}
function isSat(y,m,d){return new Date(y,m-1,d).getDay()===6}
function dw(y,m,d){return DOW[new Date(y,m-1,d).getDay()]}
function getSundays(y,m){const r=[];for(let d=1;d<=daysInMonth(y,m);d++)if(isSun(y,m,d))r.push(d);return r}
function key(n,y,m,d){return `${n}_${y}_${m}_${d}`}

function getWeeks(y,m){
  const total=daysInMonth(y,m);
  const weeks=[];
  const firstDow=new Date(y,m-1,1).getDay();
  let end=firstDow===0?1:1+(7-firstDow);
  end=Math.min(end,total);
  const w0=[];for(let d=1;d<=end;d++)w0.push(d);
  weeks.push(w0);
  let day=end+1;
  while(day<=total){
    const w=[];
    for(let i=0;i<7&&day<=total;i++,day++)w.push(day);
    weeks.push(w);
  }
  return weeks;
}

function changeMonth(dir){
  curM+=dir;
  if(curM>12){curM=1;curY++}
  if(curM<1){curM=12;curY--}
  curWeek=0;
  renderAll();
}

function changeWeek(dir){
  const wks=getWeeks(curY,curM);
  curWeek=Math.max(0,Math.min(wks.length-1,curWeek+dir));
  renderInput();
}

function switchTab(t){
  curTab=t;
  ['input','salary','manage'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
  });
  document.querySelectorAll('.mtab').forEach((el,i)=>el.classList.toggle('on',['input','salary','manage'][i]===t));
  if(t==='salary'){
    document.getElementById('pin-screen').style.display='block';
    document.getElementById('salary-screen').style.display='none';
    pinVal='';updateDots();
  }
  if(t==='manage') renderManage();
}

function renderHeader(){
  document.getElementById('month-label').textContent=`${curY}년 ${curM}월`;
}

function renderInput(){
  const wks=getWeeks(curY,curM);
  const wk=wks[curWeek]||[];
  const s=wk[0],e=wk[wk.length-1];
  document.getElementById('week-label').textContent=`${curM}/${s}(${dw(curY,curM,s)}) — ${curM}/${e}(${dw(curY,curM,e)})`;
  document.getElementById('week-badge').textContent=`${curWeek+1}주차`;
  document.getElementById('btn-prev').disabled=curWeek===0;
  document.getElementById('btn-next').disabled=curWeek===wks.length-1;

  if(emps.length===0){
    document.getElementById('emp-list').innerHTML=`
      <div style="text-align:center;padding:48px 16px;color:#aaa">
        <div style="font-size:36px;margin-bottom:12px">👤</div>
        <div style="font-size:14px;font-weight:600;color:#888;margin-bottom:6px">등록된 직원이 없어요</div>
        <div style="font-size:12px">'직원 관리' 탭에서 직원을 추가해주세요</div>
      </div>`;
    return;
  }
  document.getElementById('emp-list').innerHTML=emps.map(emp=>{
    const cells=wk.map(d=>{
      const v=isSun(curY,curM,d)?'휴무':(att[key(emp.n,curY,curM,d)]||'');
      const cls=isSun(curY,curM,d)?'sun':isSat(curY,curM,d)?'sat':'';
      const onclick=!isSun(curY,curM,d)?` onclick="openPicker('${emp.n}',${d})"`:'' ;
      return `<div class="dcell ${cls}"${v&&!isSun(curY,curM,d)?' data-v="'+v+'"':''}${onclick}>
        <span class="dd">${d}</span><span class="dn">${dw(curY,curM,d)}</span>
        <span class="dc">${isSun(curY,curM,d)?'휴무':(v||'')}</span>
      </div>`;
    }).join('');
    return `<div class="emp-card">
      <div class="emp-head">
        <span class="emp-nm">${emp.n}</span>
        
      </div>
      <div class="days-wrap">${cells}</div>
    </div>`;
  }).join('');
}

function openPicker(name,day){
  pickerTarget={name,day};
  document.getElementById('picker-ttl').textContent=`${name}  ${curM}월 ${day}일(${dw(curY,curM,day)}) 근태 선택`;
  document.getElementById('picker-bg').style.display='flex';
}
document.getElementById('picker-bg').addEventListener('click',e=>{
  if(e.target===document.getElementById('picker-bg'))closePicker();
});
function closePicker(){document.getElementById('picker-bg').style.display='none'}

function pick(v){
  if(pickerTarget){
    const k=key(pickerTarget.name,curY,curM,pickerTarget.day);
    if(v)att[k]=v; else delete att[k];
    renderInput();
  }
  closePicker();
}

function pinInput(n){
  if(pinVal.length>=4)return;
  pinVal+=String(n);
  updateDots();
  if(pinVal.length===4){
    setTimeout(()=>{
      if(pinVal===PIN){
        document.getElementById('pin-screen').style.display='none';
        document.getElementById('salary-screen').style.display='block';
        renderSalary();
      } else {
        document.getElementById('pin-error').textContent='비밀번호가 틀렸어요';
        setTimeout(()=>{pinVal='';updateDots();document.getElementById('pin-error').textContent='';},800);
      }
      pinVal='';updateDots();
    },150);
  }
}
function pinDelete(){pinVal=pinVal.slice(0,-1);updateDots();document.getElementById('pin-error').textContent=''}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('dot'+i).classList.toggle('filled',i<pinVal.length)}
function lockSalary(){
  document.getElementById('salary-screen').style.display='none';
  document.getElementById('pin-screen').style.display='block';
  pinVal='';updateDots();
}

function renderSalary(){
  const sundays=getSundays(curY,curM);
  const total=daysInMonth(curY,curM);
  const workDays=total-sundays.length;
  let totY=0,totB=0,totH=0,totP=0;

  const rows=emps.map(emp=>{
    let y=0,b=0,h=0;
    for(let d=1;d<=total;d++){
      if(isSun(curY,curM,d))continue;
      const v=att[key(emp.n,curY,curM,d)];
      if(v==='연차')y++;else if(v==='반차')b+=0.5;else if(v==='휴무')h++;
    }
    const hourly=emp.hourly||HOURLY_DEFAULT;
    const pay=Math.round((hourly*DH)*(workDays-h)-(hourly*HH)*b);
    totY+=y;totB+=b;totH+=h;totP+=pay;
    return `<div class="sal-row">
      <span class="sal-name">${emp.n}</span>
      <div class="sal-nums">
        ${y?`<span class="sal-tag t-y">연${y}</span>`:''}
        ${b?`<span class="sal-tag t-b">반${b}</span>`:''}
        ${h?`<span class="sal-tag t-h">휴${h}</span>`:''}
        <span class="sal-pay">${pay.toLocaleString()}원</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('sum-cards').innerHTML=`
    <div class="scard"><div class="scard-label">전체 급여 합계</div><div class="scard-val">${Math.round(totP/10000)}만원</div><div class="scard-sub">${totP.toLocaleString()}원</div></div>
    <div class="scard"><div class="scard-label">연차 / 반차 / 휴무</div><div class="scard-val" style="font-size:15px">${totY} / ${totB} / ${totH}일</div><div class="scard-sub">전 직원 합산</div></div>`;
  document.getElementById('sal-wrap').innerHTML=`
    <div class="sal-header"><span>이름</span><span>근태 &amp; 급여</span></div>${rows}
    <div class="sal-row total">
      <span class="sal-name" style="font-weight:700">합계</span>
      <div class="sal-nums">
        ${totY?`<span class="sal-tag t-y">연${totY}</span>`:''}
        ${totB?`<span class="sal-tag t-b">반${totB}</span>`:''}
        ${totH?`<span class="sal-tag t-h">휴${totH}</span>`:''}
        <span class="sal-pay" style="font-size:13px">${totP.toLocaleString()}원</span>
      </div>
    </div>`;
}

function renderManage(){
  document.getElementById('manage-list').innerHTML=emps.map((emp,i)=>`
    <div class="emp-manage-row">
      <div class="emp-manage-info">
        <div class="emp-manage-name">${emp.n}</div>
        <div class="emp-manage-sub">연차 ${emp.leave}일 · 시급 ${(emp.hourly||HOURLY_DEFAULT).toLocaleString()}원</div>
      </div>
      <button class="del-btn" onclick="removeEmployee(${i})">삭제</button>
    </div>`).join('');
}

function addEmployee(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){showToast('이름을 입력해주세요');return}
  const group=document.getElementById('new-group').value;
  const leave=parseInt(document.getElementById('new-leave').value)||15;
  const hourly=parseInt(document.getElementById('new-hourly').value)||0;
  emps.push({n:name,g:group,leave,hourly});
  document.getElementById('new-name').value='';
  document.getElementById('new-hourly').value='';
  saveData(true);
  renderManage();
  showToast(`${name} 추가 완료!`);
}

function removeEmployee(i){
  const name=e
